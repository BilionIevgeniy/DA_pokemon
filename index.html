<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="scripts/script.js" type="module"></script>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="icon" type="image/x-icon" href="assets/img/fav.png">
  <title>PokeDex</title>
</head>
<body>
  <h1>Pokemon</h1>
  <input data-action="filterPokemonsAction" id="filterName" type="text">
  <div class="pokemon-cards-wrapper"></div>
  <div class="more-pokemons-btn-wrapper">
    <button data-action="fetchPokemonsAction" class="more-pokemons-btn">More Pokemons</button>
  </div>
  <!-- Modal -->
  <div data-action="closeModalAction" class="modal pokemons-modal"></div>
  <div class="modal spinner">
    <img src="assets/spinner.gif" alt="Loading">
  </div>
</body>
</html>
